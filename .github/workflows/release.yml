name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write   # create the GitHub Release

jobs:
  publish:
    name: Test & publish to Maven Central
    # macOS runner: required to build/publish the iOS targets.
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Unit tests
        run: ./gradlew :krumb-core:desktopTest :krumb-compose:desktopTest --stacktrace

      - name: Publish to Maven Central
        # Version is taken from the tag (e.g. v0.2.0 -> 0.2.0).
        # automaticRelease=false: this uploads a staged deployment that you
        # approve in the Central Portal UI. To fully automate, switch the
        # build to publishAndReleaseToMavenCentral / automaticRelease=true.
        env:
          KRUMB_RELEASE_VERSION: ${{ github.ref_name }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_IN_MEMORY_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        run: ./gradlew publishToMavenCentral --no-configuration-cache --stacktrace

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" --generate-notes --verify-tag

      - name: Upload build reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-reports
          path: '**/build/reports/'
          retention-days: 7
